apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: lyh-ns
spec:
  clusterIP: None
  selector:
    app: db
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: lyh-ns
spec:
  serviceName: db
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
        tier: database
        registry-rewrite: enabled
    spec:
      imagePullSecrets:
        - name: lyh-secret-ncr
      containers:
        - name: mariadb
          image: mariadb:11.4
          ports:
            - containerPort: 3306
              name: mysql
          envFrom:
            - secretRef:
                name: db-secret
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: db-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard-cinder
        resources:
          requests:
            storage: 10Gi
