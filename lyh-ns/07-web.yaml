apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: lyh-ns
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: lyh-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        tier: frontend
        registry-rewrite: enabled
    spec:
      imagePullSecrets:
        - name: lyh-secret-ncr
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: web-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: web-config
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: web-config
          configMap:
            name: web-config
